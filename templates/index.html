<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte das Princesinhas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(180deg, hsl(280 60% 80%) 0%, hsl(320 70% 85%) 30%, hsl(340 75% 85%) 60%, hsl(20 80% 85%) 100%);
            min-height: 100vh; overflow-x: hidden; color: hsl(340 80% 40%);
        }
        .container { max-width: 580px; margin: 0 auto; padding: 2rem 1rem; position: relative; z-index: 10; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-radius: 1rem; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); border: 1px solid rgba(255, 255, 255, 0.5); padding: 1.5rem; margin-bottom: 1.5rem; }
        .header { background: linear-gradient(90deg, hsl(340 85% 55%) 0%, hsl(340 90% 65%) 100%); border-radius: 1rem; padding: 1rem 1.5rem; text-align: center; margin-bottom: 1.5rem; }
        .header h1 { color: white; font-size: 1.5rem; font-weight: 700; }
        .section-title { color: hsl(340 85% 55%); font-weight: 700; font-size: 1.125rem; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
        .section-title.center { justify-content: center; }
        .platforms { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-top: 1rem; }
        .platform-btn { background: linear-gradient(135deg, hsl(340 85% 55%) 0%, hsl(350 90% 60%) 100%); color: white; border: none; padding: 0.625rem 1.25rem; border-radius: 9999px; font-weight: 600; font-size: 0.875rem; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3); }
        .platform-btn.selected { transform: scale(1.05); box-shadow: 0 8px 25px rgba(236, 72, 153, 0.5); outline: 3px solid white; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border-radius: 9999px; border: 1px solid hsl(340 40% 90%); font-family: 'Poppins', sans-serif; }
        .submit-btn { width: 100%; background: linear-gradient(90deg, hsl(340 85% 55%) 0%, hsl(340 90% 65%) 100%); color: white; border: none; padding: 0.875rem 1.5rem; border-radius: 0.75rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
        .notifications-container { position: fixed; top: 20px; right: 20px; z-index: 1000; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        .notification { background: white; border-radius: 10px; padding: 15px; border-left: 5px solid hsl(340 85% 55%); box-shadow: 0 5px 15px rgba(0,0,0,0.1); animation: slideIn 0.3s ease-out; }
        .notification.success { border-left-color: #22c55e; }
        .notification.error { border-left-color: #ef4444; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="notifications-container" id="notificationsContainer"></div>

    <div class="container">
        <header class="header">
            <h1>🌸 Suporte das Princesinhas 🌸</h1>
        </header>

        <section class="glass-card">
            <h3 class="section-title">📱 Selecione a Plataforma</h3>
            <div class="platforms">
                <button type="button" class="platform-btn" data-platform="max" onclick="selectPlatform('max', this)">📺 Max</button>
                <button type="button" class="platform-btn" data-platform="globoplay" onclick="selectPlatform('globoplay', this)">📺 Globoplay</button>
                <button type="button" class="platform-btn" data-platform="disneyplus" onclick="selectPlatform('disneyplus', this)">🏰 Disney+</button>
                <button type="button" class="platform-btn" data-platform="globo_atualizar" onclick="selectPlatform('globo_atualizar', this)">🔄 Atualizar Globo</button>
            </div>
        </section>

        <section class="glass-card">
            <h2 class="section-title center">🔐 Acesso ao Código</h2>
            <form id="accessForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label class="form-label">👤 Plataforma</label>
                    <input type="text" class="form-input" id="streamName" placeholder="Selecione acima" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">✉️ Seu Email</label>
                    <input type="email" class="form-input" id="email" placeholder="Digite seu email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">📞 WhatsApp ou Telegram</label>
                    <input type="text" class="form-input" id="phone" placeholder="Digite seu contato" required>
                </div>
                <button type="submit" id="submitBtn" class="submit-btn">🔐 Verificar Acesso 💕</button>
            </form>
        </section>
    </div>

    <script>
        let selectedPlatform = '';

        function selectPlatform(platform, btn) {
            selectedPlatform = platform;
            document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            
            const names = {
                'max': 'Max',
                'globoplay': 'Globoplay',
                'disneyplus': 'Disney+',
                'globo_atualizar': 'Atualizar Globo'
            };
            document.getElementById('streamName').value = names[platform];
        }

        function showNotification(title, message, type = 'info') {
            const container = document.getElementById('notificationsContainer');
            const div = document.createElement('div');
            div.className = `notification ${type}`;
            div.innerHTML = `<strong>${title}</strong><br>${message}`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 10000);
        }

        async function handleSubmit(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const submitBtn = document.getElementById('submitBtn');

            if (!selectedPlatform) {
                showNotification('Erro ❌', 'Selecione uma plataforma primeiro.', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = '⏳ Verificando...';

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        plataforma: selectedPlatform,
                        email: email,
                        telefone: phone
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showNotification('✅ Sucesso! 🎉', `Seu código de acesso: <strong>${data.codigo}</strong>`, 'success');
                    document.getElementById('accessForm').reset();
                    selectedPlatform = '';
                    document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('selected'));
                } else {
                    showNotification('Erro ❌', data.message || 'Código não encontrado.', 'error');
                }
            } catch (error) {
                console.error(error);
                showNotification('Erro ❌', 'Falha na conexão com o servidor.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = '🔐 Verificar Acesso 💕';
            }
        }
    </script>
</body>
</html>
